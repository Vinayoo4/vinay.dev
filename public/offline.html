<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | SALTEDHASH</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Inter:wght@400;500&display=swap');

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #111827;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      text-align: center;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    p {
      color: #9CA3AF;
      max-width: 24rem;
      margin: 0 auto 2rem;
      line-height: 1.5;
    }

    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: rgba(255, 255, 255, 0.1);
      color: #FFFFFF;
      text-decoration: none;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    a:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="wordmark">SALTEDHASH</div>

  <div>
    <h1>You're offline.</h1>
    <p>The page you requested isn't cached yet. Check your connection and try again.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
